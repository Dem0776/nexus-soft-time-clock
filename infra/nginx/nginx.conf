# =====================================================================
# NGINX — reverse proxy del stack local.
# Enruta el portal (/) y la API (/api, /actuator, /swagger) al backend.
# En producción: TLS con cert-manager en el Ingress (ADR/despliegue).
# =====================================================================
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Rate limiting perimetral (RNF-07). La app aplica límites finos con Redis.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    upstream backend { server backend:8080; }
    upstream web     { server web:80; }

    server {
        listen 80;
        server_name _;

        # Portal Angular (PWA)
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API REST + Actuator + OpenAPI
        location ~ ^/(api|actuator|v3/api-docs|swagger-ui) {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket (tiempo real, STOMP)
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
