# Scrapea las métricas del backend expuestas por Spring Actuator (RNF-11).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nexus-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: 'nexus-time-clock'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
