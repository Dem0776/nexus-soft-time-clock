# =====================================================================
# NGINX del contenedor `web` (sirve el build de Angular).
# Fallback SPA: cualquier ruta que no sea un archivo estático devuelve
# index.html para que el router de Angular resuelva enlaces directos y
# refrescos (F5) en rutas profundas sin dar 404.
# =====================================================================
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets con hash: cache larga.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|map)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Rutas de la SPA: si no hay archivo, servir index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
