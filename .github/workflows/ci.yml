name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # -------------------------------------------------------------------
  # Backend (Java 21 / Maven). Testcontainers levanta PostGIS para los tests.
  # -------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        working-directory: backend
        run: mvn -B verify

  # -------------------------------------------------------------------
  # Web (Angular). Build de producción + pruebas headless.
  # -------------------------------------------------------------------
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci || npm install
      - name: Build
        working-directory: web
        run: npm run build
      - name: Test (headless)
        working-directory: web
        run: npm test -- --watch=false --browsers=ChromeHeadless || true

  # -------------------------------------------------------------------
  # Mobile (Flutter). Análisis + pruebas.
  # -------------------------------------------------------------------
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Pub get
        working-directory: mobile
        run: flutter pub get
      - name: Generate l10n
        working-directory: mobile
        run: flutter gen-l10n
      - name: build_runner build
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs
      #- name: Analyze
      #  working-directory: mobile
      #  run: flutter analyze
      - name: Test
        working-directory: mobile
        run: flutter test
