plugins {
    id "com.android.application"
    id "kotlin-android"
    // El plugin de Flutter debe aplicarse después de los de Android/Kotlin.
    id "dev.flutter.flutter-gradle-plugin"
    // Para habilitar Firebase (Messaging/Crashlytics/Analytics), añade google-services.json
    // en android/app/ y descomenta la línea siguiente (+ la de settings.gradle):
    // id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.condor.nexussoft.timeclock"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8.toString()
    }

    defaultConfig {
        applicationId = "com.condor.nexussoft.timeclock"
        // minSdk 23: requerido por biometría (BiometricPrompt), Firebase y mobile_scanner.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true
    }

    buildTypes {
        release {
            // Firma de depuración para permitir `flutter run --release` sin configurar keystore.
            // Reemplaza por tu signingConfig de release antes de publicar.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
