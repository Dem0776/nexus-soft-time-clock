name: nexus_time_clock
description: "Nexus Soft Time Clock — App de empleados (offline-first)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado y navegación
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # Red y serialización
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Persistencia local (offline-first) — Drift/SQLite
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Seguridad y dispositivo
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # Ubicación y captura
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  mobile_scanner: ^5.2.3

  # Firebase (mensajería, crashlytics, analytics)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

  uuid: ^4.5.1
  intl: any
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  generate: true   # habilita gen-l10n (i18n)
