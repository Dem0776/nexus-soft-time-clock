# Perfil de desarrollo. Se activa con SPRING_PROFILES_ACTIVE=dev
# Apunta a los servicios del docker-compose de infra/.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nexus}
    username: ${DB_USER:nexus}
    password: ${DB_PASSWORD:nexus}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}   # MailHog

logging:
  level:
    org.hibernate.SQL: DEBUG
